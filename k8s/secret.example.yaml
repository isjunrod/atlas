# Ejemplo del secret que consume el deployment.
# Crear el real fuera del repo:
#   kubectl -n atlas create secret generic atlas-secrets \
#     --from-literal=WHATSAPP_PHONE_ID=... \
#     --from-literal=WHATSAPP_ACCESS_TOKEN=... \
#     --from-literal=WHATSAPP_VERIFY_TOKEN=... \
#     --from-literal=OPENAI_API_KEY=... \
#     --from-literal=ATLAS_VECTOR_STORE_ID=... \
#     --from-literal=DATABASE_URL=postgres://... \
#     --from-literal=SMTP_USER=... \
#     --from-literal=SMTP_PASS=... \
#     --from-literal=ESCALATION_EMAIL_TO=director.educacion@adschool.agency \
#     --from-literal=ESCALATION_EMAIL_FROM='ATLAS <atlas-bot@...>' \
#     --from-literal=ADMIN_USER=karen \
#     --from-literal=ADMIN_PASS=... \
#     --from-literal=ADMIN_SESSION_SECRET=$(openssl rand -hex 32)

apiVersion: v1
kind: Secret
metadata:
  name: atlas-secrets
  namespace: atlas
type: Opaque
stringData:
  WHATSAPP_PHONE_ID: "change_me"
  WHATSAPP_ACCESS_TOKEN: "change_me"
  WHATSAPP_VERIFY_TOKEN: "change_me"
  OPENAI_API_KEY: "change_me"
  OPENAI_CHAT_MODEL: "gpt-4.1-mini"
  ATLAS_VECTOR_STORE_ID: ""
  DATABASE_URL: "postgres://user:pass@host:port/atlas?sslmode=require"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: "change_me"
  SMTP_PASS: "change_me"
  ESCALATION_EMAIL_TO: "director.educacion@adschool.agency"
  ESCALATION_EMAIL_FROM: "ATLAS <atlas-bot@example.com>"
  ADMIN_USER: "karen"
  ADMIN_PASS: "change_me"
  ADMIN_SESSION_SECRET: "change_me"
